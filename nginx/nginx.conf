events {
    # Настройки событий (можно оставить пустым)
    worker_connections 1024;
}

http {
		include /etc/nginx/mime.types;

    server {
    listen 80;
    server_name webontology.ru www.webontology.ru;

    location / {
        proxy_pass http://frontend:80;  # Имя контейнера фронтенда, на котором работает React-приложение
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /public/ {
        proxy_pass http://backend:9090;  # Имя контейнера бэкенда, на котором работает Go-сервис
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

}
