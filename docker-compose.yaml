services:
  # nginx:
  #   image: nginx:latest
  #   container_name: nginx
  #   ports:
  #     - "80:80"
  #   volumes:
  #     - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./nginx/html:/usr/share/nginx/html:ro
  #   networks:
  #     - app-network

  frontend:
    container_name: frontend
    build:
      context: ./frontend/
      dockerfile: ./Dockerfile
      args:
        API_URL: webontology.ru:3080
    ports:
      - "80:80"
    networks:
      - app-network

  backend:
    container_name: backend
    build:
      context: ./backend/
      dockerfile: ./cmd/Dockerfile
    environment:
      DOMAIN_URL: localhost
      ORIGIN: webontology.ru
    ports:
      - "9090:3080"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
